<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Mac mini M4 価格トラッカー</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
         max-width: 980px; margin: 2rem auto; padding: 0 1rem; color: #222; }
  h1 { font-size: 1.4rem; }
  h2 { font-size: 1.1rem; margin-top: 2rem; }
  .muted { color: #888; font-size: 0.85rem; }
  table { border-collapse: collapse; width: 100%; font-size: 0.9rem; }
  th, td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #eee; text-align: left; }
  th { background: #fafafa; }
  .source { display: inline-block; padding: 0 0.4rem; border-radius: 4px;
            font-size: 0.75rem; background: #eef; color: #225; }
  .empty { padding: 1rem; background: #f7f7f7; border-radius: 6px; color: #666; }
  canvas { max-height: 320px; }
  .news { list-style: none; padding: 0; margin: 0; }
  .news li { padding: 0.6rem 0; border-bottom: 1px solid #eee; }
  .news a { color: #225; text-decoration: none; }
  .news a:hover { text-decoration: underline; }
  .news .meta { display: block; font-size: 0.75rem; color: #888; margin-top: 0.2rem; }
  .badge { display: inline-block; font-size: 0.7rem; padding: 0 0.4rem;
           background: #fef3c7; color: #92400e; border-radius: 3px; margin-right: 0.3rem; }
</style>
</head>
<body>
  <h1>Mac mini M4 価格トラッカー <span id="today" class="muted"></span></h1>
  <p class="muted">対象: M4 Mac mini (24GB / 32GB) — 新品 (Apple整備済) / 中古 (イオシス)</p>

  <h2>今日の在庫</h2>
  <div id="listings"></div>

  <h2>価格推移 (日次最安値)</h2>
  <canvas id="chart"></canvas>

  <h2>在庫数推移 (日次件数)</h2>
  <p class="muted">在庫枯渇のトレンド把握用。0 = その日その条件の出品なし。</p>
  <canvas id="stockChart"></canvas>

  <h2>関連ニュース</h2>
  <p class="muted" id="newsMeta"></p>
  <ul id="news" class="news"></ul>

  <p class="muted" id="generated"></p>

<script>
const PALETTE = {
  apple_refurb_24GB: '#0a84ff', apple_refurb_32GB: '#3399ff',
  iosys_24GB:        '#ff6b35', iosys_32GB:        '#ffa07a',
  amazon_24GB:       '#34c759', amazon_32GB:       '#7fdc8a',
};

function buildDatasets(seriesObj) {
  const datasets = [];
  const allDates = new Set();
  for (const src of Object.keys(seriesObj)) {
    for (const mem of Object.keys(seriesObj[src])) {
      const points = seriesObj[src][mem];
      for (const d of Object.keys(points)) allDates.add(d);
      const label = `${src} ${mem}`;
      const color = PALETTE[`${src}_${mem}`] || '#888';
      datasets.push({ label, points, borderColor: color, backgroundColor: color,
                      tension: 0.2, spanGaps: true });
    }
  }
  const dates = [...allDates].sort();
  for (const ds of datasets) {
    ds.data = dates.map(d => ds.points[d] ?? null);
    delete ds.points;
  }
  return { dates, datasets };
}

function renderNews(news) {
  const root = document.getElementById('news');
  const meta = document.getElementById('newsMeta');
  const items = (news && news.items) || [];
  if (!items.length) {
    root.innerHTML = '<li class="empty">取得済みのニュースはありません</li>';
    return;
  }
  meta.textContent = news.fetched_at ? `ニュース更新: ${news.fetched_at}` : '';
  root.innerHTML = items.map(n => {
    const date = n.published ? n.published.slice(0, 10) : '';
    const src = n.source ? ` · ${n.source}` : '';
    const q = n.query ? `<span class="badge">${n.query}</span>` : '';
    return `<li>${q}<a href="${n.url}" target="_blank" rel="noopener">${n.title}</a>
            <span class="meta">${date}${src}</span></li>`;
  }).join('');
}

async function main() {
  const data = await fetch('data.json').then(r => r.json());
  document.getElementById('today').textContent = data.today ? `(${data.today})` : '';
  document.getElementById('generated').textContent = data.generated_at
    ? `更新: ${data.generated_at}` : '';

  // listings table
  const listings = data.listings || [];
  const root = document.getElementById('listings');
  if (!listings.length) {
    root.innerHTML = '<div class="empty">該当する在庫はありません</div>';
  } else {
    const rows = listings.map(l => `
      <tr>
        <td><span class="source">${l.source}</span></td>
        <td>${l.memory_gb ?? '?'}GB</td>
        <td>${l.storage_gb ?? '?'}GB</td>
        <td>¥${(l.price_jpy ?? 0).toLocaleString()}</td>
        <td><a href="${l.url}" target="_blank" rel="noopener">${l.title}</a></td>
      </tr>`).join('');
    root.innerHTML = `<table>
      <thead><tr><th>ソース</th><th>メモリ</th><th>ストレージ</th><th>価格</th><th>タイトル</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  }

  // price chart
  const price = buildDatasets(data.series || {});
  new Chart(document.getElementById('chart'), {
    type: 'line',
    data: { labels: price.dates, datasets: price.datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      scales: { y: { ticks: { callback: v => '¥' + v.toLocaleString() } } },
    },
  });

  // stock-count chart
  const stock = buildDatasets(data.stock || {});
  new Chart(document.getElementById('stockChart'), {
    type: 'line',
    data: { labels: stock.dates, datasets: stock.datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
    },
  });

  renderNews(data.news);
}
main();
</script>
</body>
</html>
