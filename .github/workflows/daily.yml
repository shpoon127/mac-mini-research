name: daily

on:
  schedule:
    - cron: "0 22 * * *"  # 07:00 JST (UTC+9)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Fetch listings
        run: uv run tracker fetch

      - name: Notify Slack on buy signals
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: uv run tracker notify

      - name: Render dashboard
        run: uv run tracker render

      - name: Commit data + site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ site/
          git diff --cached --quiet || git commit -m "daily snapshot $(date -u +%F)"
          git push

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - id: deploy
        uses: actions/deploy-pages@v4
