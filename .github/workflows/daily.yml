name: daily

on:
  schedule:
    - cron: "0 22 * * *"  # 07:00 JST (UTC+9)
  workflow_dispatch:
    inputs:
      test_notify:
        description: "Send a test Slack notification only (skip fetch/render)"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Test Slack notification (manual)
        if: github.event.inputs.test_notify == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: uv run tracker notify --test

      - name: Fetch listings
        if: github.event.inputs.test_notify != 'true'
        run: uv run tracker fetch

      - name: Notify Slack on buy signals
        if: github.event.inputs.test_notify != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: uv run tracker notify

      - name: Fetch news (Google News RSS)
        if: github.event.inputs.test_notify != 'true'
        run: uv run tracker news
        continue-on-error: true

      - name: Render dashboard
        if: github.event.inputs.test_notify != 'true'
        run: uv run tracker render

      - name: Commit data + site
        if: github.event.inputs.test_notify != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ site/
          git diff --cached --quiet || git commit -m "daily snapshot $(date -u +%F)"
          git push

      - if: github.event.inputs.test_notify != 'true'
        uses: actions/configure-pages@v5
      - if: github.event.inputs.test_notify != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - id: deploy
        if: github.event.inputs.test_notify != 'true'
        uses: actions/deploy-pages@v4
